appId: com.vision-agent.app
productName: Vision Agent
directories:
  buildResources: build
extraResources:
  - from: src/main/skills
    to: skills
    filter:
      - '*/SKILL.md'
      - '*/references/*'
      - '*/.claude-plugin/*'
      - '*/.claude/*'
      - '*/plugins/**/*'
      - '*/bold-template-pack/*'
      - '!*/.DS_Store'
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
publish:
  provider: github
  owner: shuangmusuihua-source
  repo: vision-agent
asarUnpack:
  - '**/@anthropic-ai/claude-agent-sdk-darwin-arm64/**'
  - '**/@anthropic-ai/claude-agent-sdk/cli.js'
  - '**/@anthropic-ai/claude-agent-sdk/**/*.js'
  - '**/@anthropic-ai/claude-agent-sdk/**/*.json'
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  extendInfo:
    NSDocumentsFolderUsageDescription: "Vision Agent needs access to your Documents folder to create workspaces."
    NSDesktopFolderUsageDescription: "Vision Agent needs access to your Desktop folder to open workspace directories."
afterSign: scripts/notarize.js
dmg:
  sign: true
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications