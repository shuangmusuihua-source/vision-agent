appId: app.sumi.desktop
productName: sumi
directories:
  buildResources: build
extraResources:
  - from: src/main/skills
    to: skills
    filter:
      - '*/SKILL.md'
      - '*/scan.sh'
      - '*/references/*'
      - '*/.claude-plugin/*'
      - '*/.claude/*'
      - '*/plugins/**/*'
      - '*/bold-template-pack/*'
      - '!*/.DS_Store'
files:
  - '!**/.vscode/*'
  - '!**/.claude/**'
  - '!**/.codex/**'
  - '!**/.agents/**'
  - '!**/.git/**'
  - '!dist/**'
  - '!docs/**'
  - '!tests/**'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!*.html'
publish:
  provider: github
  owner: shuangmusuihua-source
  repo: vision-agent
asarUnpack:
  - '**/@anthropic-ai/claude-agent-sdk-darwin-arm64/**'
  - '**/@anthropic-ai/claude-agent-sdk/cli.js'
  - '**/@anthropic-ai/claude-agent-sdk/**/*.js'
  - '**/@anthropic-ai/claude-agent-sdk/**/*.json'
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  extendInfo:
    NSDocumentsFolderUsageDescription: "sumi needs access to your Documents folder to create workspaces."
    NSDesktopFolderUsageDescription: "sumi needs access to your Desktop folder to open workspace directories."
# afterSign: scripts/notarize.js  # disabled for unsigned internal testing
dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
